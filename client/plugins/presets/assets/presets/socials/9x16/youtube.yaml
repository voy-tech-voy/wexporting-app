# YouTube Shorts Pro (9:16)
# High-bitrate vertical optimized for the Shorts player

meta:
  id: "youtube_shorts_9x16"
  name: "YouTube"
  category: "social"
  ratio: "9x16"
  description: "9:16 Vertical optimized for YouTube Shorts. Features smooth motion and aggressive sharpening."
  version: "2.0"

style:
  accent_color: "#FF0000"
  icon: "mobile"
  glow_strength: "strong"

parameters:
  - id: "fill_method"
    type: "segmented_pill"
    label: "Fill Method"
    options: ["Blur", "Crop", "Fit"]
    default: "Crop"

pipeline:
  - tool: "ffmpeg"
    description: "Shorts Optimization"
    filename_suffix: "_YT_Shorts"
    command_template: >
      {{ tool_exe }} -y -i "{{ input_path }}"

      {# --- GEOMETRY (1080x1920) --- #}
      {% if fill_method == 'Blur' %}
        -filter_complex "[0:v]split[bg][fg];
        [bg]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,boxblur=20:10[bg_b];
        [fg]scale=1080:1920:force_original_aspect_ratio=decrease[fg_s];
        [bg_blur][fg_scaled]overlay=(W-w)/2:(H-h)/2,unsharp=5:5:0.7:5:5:0.0[v]"
        -map "[v]" -map 0:a?
      {% elif fill_method == 'Crop' %}
        -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,unsharp=5:5:0.7:5:5:0.0"
      {% else %}
        -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black,unsharp=5:5:0.7:5:5:0.0"
      {% endif %}

      -c:v libx264 -preset medium -crf 18 -maxrate 25M -bufsize 50M
      -r {{ 60 if meta.fps > 50 else 30 }}
      -pix_fmt yuv420p -movflags +faststart
      -c:a aac -b:a 256k
      "{{ output_path }}"