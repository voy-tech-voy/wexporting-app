# X Square Pro (1:1)
# The most compatible format for the X timeline

meta:
  id: "x_square"
  name: "X Square"
  category: "social"
  ratio: "1x1"
  description: "1:1 format. The gold standard for X timeline compatibility and reach."
  version: "1.0"

style:
  accent_color: "#000000"
  icon: "X_icon"

pipeline:
  - tool: "ffmpeg"
    description: "X Square Conversion"
    filename_suffix: "_X_1x1"
    command_template: >
      {{ tool_exe }} -y -i "{{ input_path }}"

      -vf "scale=1080:1080:force_original_aspect_ratio=increase,crop=1080:1080,unsharp=5:5:0.7:5:5:0.0"

      -c:v {{ gpu_encoder }} {{ get_h264_flags(21) }} -pix_fmt yuv420p
      -r 30 -g 60 -c:a aac -b:a 128k
      -movflags +faststart
      "{{ output_path }}"