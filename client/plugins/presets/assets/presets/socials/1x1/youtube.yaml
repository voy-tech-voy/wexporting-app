# YouTube 1:1 Preset
meta:
  id: "youtube_11"
  name: "YouTube"
  category: "social"
  ratio: "1x1"
  version: "1.0"
style:
  accent_color: "#FF0000"
  icon: "yt"
constraints:
  accepted_types: ["video"]
parameters: []
pipeline:
  - tool: "ffmpeg"
    command_template: |
      {{ tool_exe }} -y -i "{{ input_path }}"
      -vf "scale=1080:1080:force_original_aspect_ratio=decrease,pad=1080:1080:(ow-iw)/2:(oh-ih)/2:black"
      -c:v {{ gpu_encoder }} {{ get_h264_flags(23) }} -c:a aac -b:a 128k -movflags +faststart
      "{{ output_path }}"
