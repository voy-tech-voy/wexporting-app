# YouTube 3:4 Preset
meta:
  id: "youtube_34"
  name: "YouTube"
  category: "social"
  ratio: "3x4"
  version: "1.0"
style:
  accent_color: "#FF0000"
  icon: "yt"
constraints:
  accepted_types: ["video"]
parameters: []
pipeline:
  - tool: "ffmpeg"
    command_template: |
      {{ tool_exe }} -y -i "{{ input_path }}"
      -vf "scale=1080:1350:force_original_aspect_ratio=decrease,pad=1080:1350:(ow-iw)/2:(oh-ih)/2:black"
      -c:v libx264 -preset medium -crf 23 -c:a aac -b:a 128k -movflags +faststart
      "{{ output_path }}"
