# ============================================================================
# PRO AI DENOISER (REALCUGAN)
# ============================================================================
# Location: client/plugins/presets/assets/presets/video/ai_denoise_realcugan.yaml
# Category: video
# Logic: Uses RealCUGAN at 1x scale for professional AI denoising.
# ============================================================================

meta:
  id: "video_ai_denoise_realcugan"
  name: "AI Denoise (RealCUGAN)"
  category: "video"
  description: "Professional AI denoising using RealCUGAN. Excellent for anime, cartoons, and digital art."
  version: "1.0"

style:
  accent_color: "#00E5FF"         # Cyan (RealCUGAN Style)
  icon: "text:AI Denoise"
  glow_strength: "strong"

constraints:
  accepted_types: ["video"]
  accepted_extensions: [".mp4", ".mov", ".mkv", ".avi", ".webm"]
  min_duration: 0.1
  requires_gpu: true

parameters:
  - id: "model_type"
    type: "segmented_pill"
    label: "Model Quality"
    options: ["Pro (Best)", "SE (Balanced)", "Nose (Fast)"]
    default: "Pro (Best)"
    tooltip: "Pro: Highest quality. SE: Balanced quality/speed. Nose: Fastest processing."

  - id: "denoise_level"
    type: "segmented_pill"
    label: "Denoise Strength"
    options: ["Conservative (-1)", "Standard (0)", "Aggressive (3)"]
    default: "Standard (0)"
    tooltip: "Conservative: Minimal denoising. Standard: Balanced. Aggressive: Maximum noise removal."

  - id: "gpu_threads"
    type: "segmented_pill"
    label: "GPU Threads"
    options: ["Auto", "Conservative (1:1:1)"]
    default: "Auto"
    tooltip: "Conservative mode limits GPU usage to prevent crashes on lower VRAM systems."

pipeline:
  # --------------------------------------------------------------------------
  # STEP 1: LOSSLESS FRAME EXTRACTION
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 1/3: Deconstructing video to frames..."
    filename_suffix: "_RealCUGAN_Denoised"
    command_template: |
      {# Create frames directory first (Windows PowerShell) #}
      powershell -Command "New-Item -ItemType Directory -Force -Path '{{ output_path_no_ext }}_frames'" && {{ tool_exe }} -y -i "{{ input_path }}" -qscale:v 1 -pix_fmt rgb24 "{{ output_path_no_ext }}_frames/frame_%08d.png"

  # --------------------------------------------------------------------------
  # STEP 2: AI DENOISING (REALCUGAN)
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 2/3: Professional AI Denoising (Vulkan)..."
    command_template: |
      {# --- MODEL LOGIC --- #}
      {% if model_type == 'Pro (Best)' %}
        {% set model_name = 'models-pro' %}
      {% elif model_type == 'SE (Balanced)' %}
        {% set model_name = 'models-se' %}
      {% else %}
        {% set model_name = 'models-nose' %}
      {% endif %}
      
      {# --- DENOISE LEVEL LOGIC --- #}
      {% if denoise_level == 'Conservative (-1)' %}
        {% set denoise_val = '-1' %}
      {% elif denoise_level == 'Standard (0)' %}
        {% set denoise_val = '0' %}
      {% else %}
        {% set denoise_val = '3' %}
      {% endif %}
      
      {# --- GPU THREAD LOGIC --- #}
      {% if gpu_threads == 'Conservative (1:1:1)' %}
        {% set thread_args = '-j 1:1:1' %}
      {% else %}
        {% set thread_args = '' %}
      {% endif %}
      
      {# --- REALCUGAN EXECUTABLE (RELATIVE PATH) --- #}
      {% set cugan_exe = "tools/realcugan-ncnn-vulkan-20220728-windows/realcugan-ncnn-vulkan.exe" %}
      
      {# Create clean frames directory and process #}
      {# Model: models-pro/se/nose, Denoise Level: -1/0/3, Scale: 2 (minimum supported) #}
      {# NOTE: RealCUGAN doesn't support 1x scale, so we use 2x and downscale in step 3 #}
      powershell -Command "New-Item -ItemType Directory -Force -Path '{{ output_path_no_ext }}_clean'" && "{{ cugan_exe }}" -i "{{ output_path_no_ext }}_frames" -o "{{ output_path_no_ext }}_clean" -n {{ denoise_val }} -s 2 -m "{{ model_name }}" -f png

  # --------------------------------------------------------------------------
  # STEP 3: REASSEMBLY
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 3/3: Reconstructing final video..."
    command_template: |
      {# Downscale from 2x back to original resolution using Lanczos filter #}
      {{ tool_exe }} -y -framerate {{ meta.fps }} -i "{{ output_path_no_ext }}_clean/frame_%08d.png" -i "{{ input_path }}" -vf "scale=iw/2:-1:flags=lanczos" -map 0:v -map 1:a? -c:v libx264 -preset slow -crf 17 -pix_fmt yuv420p -movflags +faststart "{{ output_path }}"

# ============================================================================
# CHECKLIST
# ============================================================================
# [x] Model: models-pro/se/nose with denoise levels -1/0/3, Scale 1
# [x] Pipeline: 3-step extraction/processing/reassembly
# [x] Path: tools/realcugan-ncnn-vulkan-20220728-windows/realcugan-ncnn-vulkan.exe
# [x] Safety: Unique intermediate directories
# [x] Parameters: Model quality, denoise strength, GPU threads
