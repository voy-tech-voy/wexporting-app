# ============================================================================
# PRO AI DENOISER (REALESRGAN)
# ============================================================================
# Location: client/plugins/presets/assets/presets/video/ai_denoise_realesrgan.yaml
# Category: video
# Logic: Uses RealESRGAN (AnimeVideoV3) at 2x scale for AI denoising.
# ============================================================================

meta:
  id: "video_ai_denoise_realesrgan"
  name: "AI Denoise (RealESRGAN)"
  category: "video"
  description: "Professional AI denoising using RealESRGAN. Optimized for anime and animated content."
  version: "1.0"

style:
  accent_color: "#FF6B35"         # Orange-Red (RealESRGAN Style)
  icon: "text:AI Denoise"
  glow_strength: "strong"

constraints:
  accepted_types: ["video"]
  accepted_extensions: [".mp4", ".mov", ".mkv", ".avi", ".webm"]
  min_duration: 0.1
  requires_gpu: true

parameters:
  - id: "scale_mode"
    type: "segmented_pill"
    label: "Processing Scale"
    options: ["2x (Fast)", "3x (Balanced)", "4x (Quality)"]
    default: "2x (Fast)"
    tooltip: "Higher scales provide better denoising but take longer. 2x is recommended for most cases."

  - id: "gpu_threads"
    type: "segmented_pill"
    label: "GPU Threads"
    options: ["Auto", "Conservative (1:1:1)"]
    default: "Auto"
    tooltip: "Conservative mode limits GPU usage to prevent crashes on lower VRAM systems."

pipeline:
  # --------------------------------------------------------------------------
  # STEP 1: LOSSLESS FRAME EXTRACTION
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 1/3: Deconstructing video to frames..."
    filename_suffix: "_RealESRGAN_Denoised"
    command_template: |
      {# Create frames directory first (Windows PowerShell) #}
      powershell -Command "New-Item -ItemType Directory -Force -Path '{{ output_path_no_ext }}_frames'" && {{ tool_exe }} -y -i "{{ input_path }}" -qscale:v 1 -pix_fmt rgb24 "{{ output_path_no_ext }}_frames/frame_%08d.png"

  # --------------------------------------------------------------------------
  # STEP 2: AI DENOISING (REALESRGAN)
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 2/3: Professional AI Denoising (Vulkan)..."
    command_template: |
      {# --- SCALE LOGIC --- #}
      {% if scale_mode == '2x (Fast)' %}
        {% set scale_val = '2' %}
      {% elif scale_mode == '3x (Balanced)' %}
        {% set scale_val = '3' %}
      {% else %}
        {% set scale_val = '4' %}
      {% endif %}
      
      {# --- GPU THREAD LOGIC --- #}
      {% if gpu_threads == 'Conservative (1:1:1)' %}
        {% set thread_args = '-j 1:1:1' %}
      {% else %}
        {% set thread_args = '' %}
      {% endif %}
      
      {# --- REALESRGAN EXECUTABLE (RELATIVE PATH) --- #}
      {% set esrgan_exe = "tools/realesrgan/realesrgan-ncnn-vulkan.exe" %}
      
      {# Create clean frames directory and process #}
      {# Model: realesr-animevideov3, Scale: 2/3/4 #}
      powershell -Command "New-Item -ItemType Directory -Force -Path '{{ output_path_no_ext }}_clean'" && "{{ esrgan_exe }}" -i "{{ output_path_no_ext }}_frames" -o "{{ output_path_no_ext }}_clean" -n realesr-animevideov3 -s {{ scale_val }} {{ thread_args }} -f png

  # --------------------------------------------------------------------------
  # STEP 3: REASSEMBLY
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 3/3: Reconstructing final video..."
    command_template: |
      {# --- SCALE LOGIC FOR DOWNSCALING --- #}
      {% if scale_mode == '2x (Fast)' %}
        {% set downscale_filter = 'scale=iw/2:-1:flags=lanczos' %}
      {% elif scale_mode == '3x (Balanced)' %}
        {% set downscale_filter = 'scale=iw/3:-1:flags=lanczos' %}
      {% else %}
        {% set downscale_filter = 'scale=iw/4:-1:flags=lanczos' %}
      {% endif %}
      
      {# Downscale back to original resolution using Lanczos filter #}
      {{ tool_exe }} -y -framerate {{ meta.fps }} -i "{{ output_path_no_ext }}_clean/frame_%08d.png" -i "{{ input_path }}" -vf "{{ downscale_filter }}" -map 0:v -map 1:a? -c:v libx264 -preset slow -crf 17 -pix_fmt yuv420p -movflags +faststart "{{ output_path }}"

# ============================================================================
# CHECKLIST
# ============================================================================
# [x] Model: realesr-animevideov3 with scales 2/3/4
# [x] Pipeline: 3-step extraction/processing/reassembly with downscaling
# [x] Path: tools/realesrgan/realesrgan-ncnn-vulkan.exe
# [x] Safety: Unique intermediate directories
# [x] Parameters: Processing scale, GPU threads
