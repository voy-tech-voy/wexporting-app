# ============================================================================
# SPEED-PRO AI DENOISER (WAIFU2X)
# ============================================================================
# Location: client/plugins/presets/assets/presets/video/ai_denoise_waifu2x.yaml
# Category: video
# Logic: Uses Waifu2x (cuNET) at 1x scale for high-speed denoising.
# ============================================================================

meta:
  id: "video_ai_denoise_waifu2x"
  name: "AI Denoise (Waifu2x)"
  category: "video"
  description: "High-speed AI denoising using Waifu2x (cuNET). Great for anime and clean digital art."
  version: "1.0"

style:
  accent_color: "#FF99CC"         # Light Pink (Waifu2x Style)
  icon: "text:AI Denoise"
  glow_strength: "strong"

constraints:
  accepted_types: ["video"]
  accepted_extensions: [".mp4", ".mov", ".mkv", ".avi", ".webm"]
  min_duration: 0.1
  requires_gpu: true

parameters:
  - id: "gpu_threads"
    type: "segmented_pill"
    label: "GPU Threads"
    options: ["Auto", "Conservative (1:1:1)"]
    default: "Auto"
    tooltip: "Conservative mode limits GPU usage to prevent crashes on lower VRAM systems."

pipeline:
  # --------------------------------------------------------------------------
  # STEP 1: LOSSLESS FRAME EXTRACTION
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 1/3: Deconstructing video to frames..."
    filename_suffix: "_Waifu_Denoised"
    command_template: |
      {# Create frames directory first (Windows PowerShell) #}
      powershell -Command "New-Item -ItemType Directory -Force -Path '{{ output_path_no_ext }}_frames'" && {{ tool_exe }} -y -i "{{ input_path }}" -qscale:v 1 -pix_fmt rgb24 "{{ output_path_no_ext }}_frames/frame_%08d.png"

  # --------------------------------------------------------------------------
  # STEP 2: AI DENOISING (WAIFU2X)
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 2/3: High-Speed AI Denoising (Vulkan)..."
    command_template: |
      {# --- GPU THREAD LOGIC --- #}
      {% if gpu_threads == 'Conservative (1:1:1)' %}
        {% set thread_args = '-j 1:1:1' %}
      {% else %}
        {% set thread_args = '' %}
      {% endif %}
      
      {# --- WAIFU2X EXECUTABLE (RELATIVE PATH) --- #}
      {% set waifu_exe = "tools/waifu2x-ncnn-vulkan-20250915-windows/waifu2x-ncnn-vulkan.exe" %}
      
      {# Create clean frames directory and process #}
      {# Model: models-cunet, Noise Level: 2, Scale: 1 #}
      powershell -Command "New-Item -ItemType Directory -Force -Path '{{ output_path_no_ext }}_clean'" && "{{ waifu_exe }}" -i "{{ output_path_no_ext }}_frames" -o "{{ output_path_no_ext }}_clean" -n 2 -s 1 -m "tools/waifu2x-ncnn-vulkan-20250915-windows/models-cunet" {{ thread_args }} -f png

  # --------------------------------------------------------------------------
  # STEP 3: REASSEMBLY
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 3/3: Reconstructing final video..."
    command_template: |
      {{ tool_exe }} -y -framerate {{ meta.fps }} -i "{{ output_path_no_ext }}_clean/frame_%08d.png" -i "{{ input_path }}" -map 0:v -map 1:a? -c:v libx264 -preset slow -crf 17 -pix_fmt yuv420p -movflags +faststart "{{ output_path }}"

# ============================================================================
# CHECKLIST
# ============================================================================
# [x] Model: models-cunet, Noise Level 2, Scale 1 (-n 2 -s 1)
# [x] Pipeline: 3-step extraction/processing/reassembly
# [x] Path: tools/waifu2x/waifu2x-ncnn-vulkan.exe (User specified)
# [x] Safety: Unique intermediate directories
