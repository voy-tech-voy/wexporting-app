# ============================================================================
# AI VIDEO STABILIZER (ANIME/CARTOON)
# ============================================================================
# Location: client/plugins/presets/assets/presets/video/ai_stabilizer_anime.yaml
# Category: video
# Logic: Uses RealESRGAN (AnimeVideoV3) at 1x scale to reduce noise/jitter/artifacts.
# ============================================================================

meta:
  id: "video_ai_denoise"
  name: "AI Denoise (Anime)"
  category: "video"
  description: "Advanced neural restoration for anime/cartoons. Removes compression artifacts and noise."
  version: "1.0"

style:
  accent_color: "#FF69B4"         # Hot Pink (Anime/Pro)
  icon: "magic-wand"
  glow_strength: "strong"

constraints:
  accepted_types: ["video"]
  accepted_extensions: [".mp4", ".mov", ".mkv", ".avi", ".webm"]
  min_duration: 0.1
  requires_gpu: true

parameters:
  - id: "gpu_threads"
    type: "segmented_pill"
    label: "GPU Threads"
    options: ["Auto", "Conservative (1:1:1)"]
    default: "Auto"
    tooltip: "Conservative mode limits GPU usage to prevent crashes on lower VRAM systems."

pipeline:
  # --------------------------------------------------------------------------
  # STEP 1: LOSSLESS FRAME EXTRACTION
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 1/3: Deconstructing video to frames..."
    filename_suffix: "_AI_Denoised"
    command_template: |
      {# Create frames directory first (Windows PowerShell) #}
      powershell -Command "New-Item -ItemType Directory -Force -Path '{{ output_path_no_ext }}_frames'" && {{ tool_exe }} -y -i "{{ input_path }}" -qscale:v 1 -pix_fmt rgb24 "{{ output_path_no_ext }}_frames/frame_%08d.png"

  # --------------------------------------------------------------------------
  # STEP 2: AI NEURAL DENOISING (REALESRGAN)
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 2/3: AI Neural Denoising (Vulkan)..."
    command_template: |
      {# --- GPU THREAD LOGIC --- #}
      {% if gpu_threads == 'Conservative (1:1:1)' %}
        {% set thread_args = '-j 1:1:1' %}
      {% else %}
        {% set thread_args = '' %}
      {% endif %}
      
      {# --- REALESRGAN EXECUTABLE (RELATIVE PATH) --- #}
      {% set realesr_exe = "tools/realesrgan/realesrgan-ncnn-vulkan.exe" %}
      
      {# Create clean frames directory and process #}
      {# Model: realesr-animevideov3, Scale: 2 (We upscale to denoise, then downscale later) #}
      powershell -Command "New-Item -ItemType Directory -Force -Path '{{ output_path_no_ext }}_clean'" && "{{ realesr_exe }}" -i "{{ output_path_no_ext }}_frames" -o "{{ output_path_no_ext }}_clean" -n realesr-animevideov3 -s 2 {{ thread_args }} -f png

  # --------------------------------------------------------------------------
  # STEP 3: REASSEMBLY
  # --------------------------------------------------------------------------
  - tool: "ffmpeg"
    description: "Step 3/3: Reconstructing (Downscale to original)..."
    command_template: |
      {{ tool_exe }} -y -framerate {{ meta.fps }} -i "{{ output_path_no_ext }}_clean/frame_%08d.png" -i "{{ input_path }}" -map 0:v -map 1:a? -vf "scale=iw/2:-1:flags=lanczos" -c:v libx264 -preset slow -crf 17 -pix_fmt yuv420p -movflags +faststart "{{ output_path }}"

# ============================================================================
# CHECKLIST
# ============================================================================
# [x] Model: realesr-animevideov3 at 1x scale (-s 1)
# [x] Pipeline: Frame extraction -> AI processing -> Reassembly
# [x] Audio: Original audio mapped (-map 1:a?)
# [x] Format: Lossless PNG intermediates, high-quality CRF 17 final
# [x] Safety: Unique temp directories based on output path
