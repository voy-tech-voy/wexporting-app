# YouTube 4K Master (16:9)
# Cinematic 16:9 with Smart 4K Upscaling to trigger VP9/AV1 codecs

meta:
  id: "youtube_16x9_4k"
  name: "YouTube"
  category: "social"
  ratio: "16x9"
  description: "High-bitrate 4K upscale (3840x2160). Forces YouTube to use premium codecs for maximum clarity."
  version: "2.0"

style:
  accent_color: "#FF0000" # YouTube Red
  icon: "youtube"
  glow_strength: "strong"

parameters:
  - id: "upscale"
    type: "toggle"
    label: "Enable 4K Upscale"
    default: true
    tooltip: "Upscales 1080p to 4K to force YouTube to use the higher-quality VP9/AV1 codec."

pipeline:
  - tool: "ffmpeg"
    description: "YouTube 16:9 Optimization"
    filename_suffix: "_YT_16x9_4K"
    command_template: >
      {{ tool_exe }} -y -i "{{ input_path }}"

      {# --- GEOMETRY: Smart 4K Upscale --- #}
      {% if upscale %}
        -vf "scale=3840:2160:flags=lanczos,unsharp=5:5:0.5:5:5:0.0"
      {% else %}
        -vf "scale=1920:1080:flags=lanczos,unsharp=3:3:0.3:3:3:0.0"
      {% endif %}

      {# --- ENCODING: High Bitrate for YouTube --- #}
      -c:v libx264 -preset slow -crf 17 -maxrate 50M -bufsize 100M
      -pix_fmt yuv420p -color_range 1 -colorspace bt709 -color_trc bt709 -color_primaries bt709
      -g {{ (meta.fps * 2)|int }} -bf 2
      
      {# YouTube Audio Standard #}
      -c:a aac -b:a 320k -ar 48000
      -movflags +faststart
      "{{ output_path }}"